<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#10b981"/>

  <!-- Onigiri (rice ball) shape -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="white"/>

  <!-- Nori (seaweed) wrapper at bottom -->
  <path d="M25 70 Q50 85 75 70 L75 75 Q50 90 25 75 Z" fill="#1a1a1a"/>

  <!-- Nori strip detail -->
  <path d="M30 72 Q50 82 70 72" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Simple face -->
  <circle cx="40" cy="50" r="4" fill="#1a1a1a"/>
  <circle cx="60" cy="50" r="4" fill="#1a1a1a"/>
  <ellipse cx="50" cy="62" rx="3" ry="2" fill="#ef4444"/>

  <!-- Highlight/shine -->
  <ellipse cx="35" cy="40" rx="8" ry="5" fill="#f0fdf4" opacity="0.6"/>
</svg>
